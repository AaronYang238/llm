<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 680" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ar5pp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar5dp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <style>
      .node{fill:#fafafa;stroke:#9ca3af;stroke-width:1.5;stroke-dasharray:5,3}
      .gpu{stroke:#92400e;stroke-width:1.5}
      .gpu-mlayer1{fill:#dbeafe}
      .gpu-mlayer2{fill:#fce7f3}
      .gpu-txt{font-size:11px;font-weight:600;fill:#111827}
      .role{font-size:9px;fill:#475569}
      .title{font-size:16px;font-weight:700;fill:#0f172a}
      .sub{font-size:12px;font-weight:600;fill:#0f172a}
      .tp-band{fill:none;stroke:#2563eb;stroke-width:2}
      .pp-arrow{stroke:#dc2626;stroke-width:2;fill:none;marker-end:url(#ar5pp)}
      .dp-arrow{stroke:#15803d;stroke-width:2;fill:none;marker-end:url(#ar5dp);stroke-dasharray:5,3}
      .tp-label{font-size:11px;font-weight:600;fill:#1e40af}
      .pp-label{font-size:11px;font-weight:600;fill:#991b1b}
      .dp-label{font-size:11px;font-weight:600;fill:#166534}
    </style>
  </defs>
  <text x="440" y="24" text-anchor="middle" class="title">多维并行框架: world_size = DP × PP × TP × (EP) × (CP)</text>
  <text x="440" y="42" text-anchor="middle" font-size="12" fill="#475569">示例: 16 GPU = DP=2 × PP=2 × TP=4 (Dense 模型, 训练 / 推理通用)</text>
  <!-- Replica 0 -->
  <g>
    <rect class="node" x="30" y="60" width="380" height="340" rx="8"/>
    <text x="220" y="80" text-anchor="middle" class="sub">DP rank 0 — Node 0 (模型副本 0)</text>
    <text class="pp-label" x="50" y="105">PP stage 0 (layers 0..N/2)</text>
    <g>
      <rect class="gpu gpu-mlayer1" x="50" y="115" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="90" y="143" text-anchor="middle">GPU 0</text>
      <text class="role" x="90" y="159" text-anchor="middle">TP rank 0</text>
      <rect class="gpu gpu-mlayer1" x="140" y="115" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="180" y="143" text-anchor="middle">GPU 1</text>
      <text class="role" x="180" y="159" text-anchor="middle">TP rank 1</text>
      <rect class="gpu gpu-mlayer1" x="230" y="115" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="270" y="143" text-anchor="middle">GPU 2</text>
      <text class="role" x="270" y="159" text-anchor="middle">TP rank 2</text>
      <rect class="gpu gpu-mlayer1" x="320" y="115" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="360" y="143" text-anchor="middle">GPU 3</text>
      <text class="role" x="360" y="159" text-anchor="middle">TP rank 3</text>
      <path class="tp-band" d="M 50 183 L 50 193 L 400 193 L 400 183"/>
      <text class="tp-label" x="225" y="210" text-anchor="middle">⇄ TP AllReduce (NVLink, 2 次/层)</text>
    </g>
    <line class="pp-arrow" x1="225" y1="220" x2="225" y2="255"/>
    <text class="pp-label" x="335" y="242">SendRecv H ↓ (PP, P2P)</text>
    <text class="pp-label" x="50" y="275">PP stage 1 (layers N/2..N)</text>
    <g>
      <rect class="gpu gpu-mlayer2" x="50" y="285" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="90" y="313" text-anchor="middle">GPU 4</text>
      <text class="role" x="90" y="329" text-anchor="middle">TP rank 0</text>
      <rect class="gpu gpu-mlayer2" x="140" y="285" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="180" y="313" text-anchor="middle">GPU 5</text>
      <text class="role" x="180" y="329" text-anchor="middle">TP rank 1</text>
      <rect class="gpu gpu-mlayer2" x="230" y="285" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="270" y="313" text-anchor="middle">GPU 6</text>
      <text class="role" x="270" y="329" text-anchor="middle">TP rank 2</text>
      <rect class="gpu gpu-mlayer2" x="320" y="285" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="360" y="313" text-anchor="middle">GPU 7</text>
      <text class="role" x="360" y="329" text-anchor="middle">TP rank 3</text>
      <path class="tp-band" d="M 50 353 L 50 363 L 400 363 L 400 353"/>
      <text class="tp-label" x="225" y="380" text-anchor="middle">⇄ TP AllReduce</text>
    </g>
  </g>
  <!-- Replica 1 -->
  <g>
    <rect class="node" x="450" y="60" width="400" height="340" rx="8"/>
    <text x="650" y="80" text-anchor="middle" class="sub">DP rank 1 — Node 1 (模型副本 1)</text>
    <text class="pp-label" x="470" y="105">PP stage 0</text>
    <g>
      <rect class="gpu gpu-mlayer1" x="470" y="115" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="510" y="143" text-anchor="middle">GPU 8</text>
      <text class="role" x="510" y="159" text-anchor="middle">TP rank 0</text>
      <rect class="gpu gpu-mlayer1" x="560" y="115" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="600" y="143" text-anchor="middle">GPU 9</text>
      <text class="role" x="600" y="159" text-anchor="middle">TP rank 1</text>
      <rect class="gpu gpu-mlayer1" x="650" y="115" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="690" y="143" text-anchor="middle">GPU 10</text>
      <text class="role" x="690" y="159" text-anchor="middle">TP rank 2</text>
      <rect class="gpu gpu-mlayer1" x="740" y="115" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="780" y="143" text-anchor="middle">GPU 11</text>
      <text class="role" x="780" y="159" text-anchor="middle">TP rank 3</text>
      <path class="tp-band" d="M 470 183 L 470 193 L 820 193 L 820 183"/>
      <text class="tp-label" x="645" y="210" text-anchor="middle">⇄ TP AllReduce</text>
    </g>
    <line class="pp-arrow" x1="645" y1="220" x2="645" y2="255"/>
    <text class="pp-label" x="755" y="242">SendRecv H ↓</text>
    <text class="pp-label" x="470" y="275">PP stage 1</text>
    <g>
      <rect class="gpu gpu-mlayer2" x="470" y="285" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="510" y="313" text-anchor="middle">GPU 12</text>
      <text class="role" x="510" y="329" text-anchor="middle">TP rank 0</text>
      <rect class="gpu gpu-mlayer2" x="560" y="285" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="600" y="313" text-anchor="middle">GPU 13</text>
      <text class="role" x="600" y="329" text-anchor="middle">TP rank 1</text>
      <rect class="gpu gpu-mlayer2" x="650" y="285" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="690" y="313" text-anchor="middle">GPU 14</text>
      <text class="role" x="690" y="329" text-anchor="middle">TP rank 2</text>
      <rect class="gpu gpu-mlayer2" x="740" y="285" width="80" height="60" rx="4"/>
      <text class="gpu-txt" x="780" y="313" text-anchor="middle">GPU 15</text>
      <text class="role" x="780" y="329" text-anchor="middle">TP rank 3</text>
      <path class="tp-band" d="M 470 353 L 470 363 L 820 363 L 820 353"/>
      <text class="tp-label" x="645" y="380" text-anchor="middle">⇄ TP AllReduce</text>
    </g>
  </g>
  <!-- DP arrows between replicas -->
  <g>
    <path class="dp-arrow" d="M 412 145 L 448 145"/>
    <path class="dp-arrow" d="M 448 160 L 412 160"/>
    <text class="dp-label" x="430" y="138" text-anchor="middle">DP</text>
    <path class="dp-arrow" d="M 412 315 L 448 315"/>
    <path class="dp-arrow" d="M 448 330 L 412 330"/>
    <text class="dp-label" x="430" y="308" text-anchor="middle">DP</text>
  </g>
  <text class="dp-label" x="430" y="395" text-anchor="middle">DP AllReduce (反向后 grad 同步, 跨节点 IB)</text>
  <!-- Process groups summary -->
  <g transform="translate(30,425)">
    <rect x="0" y="0" width="820" height="225" rx="6" fill="#f9fafb" stroke="#9ca3af" stroke-width="1"/>
    <text x="410" y="22" text-anchor="middle" class="sub">Process Groups &amp; 集合通信原语</text>
    <rect x="20" y="40" width="14" height="14" fill="#dbeafe" stroke="#2563eb"/>
    <text x="40" y="52" font-size="11" font-weight="600" fill="#1e40af">TP group (4 个 · 节点内 NVLink)</text>
    <text x="40" y="68" font-size="10" fill="#374151">{G0,G1,G2,G3} · {G4,G5,G6,G7} · {G8..G11} · {G12..G15}</text>
    <text x="40" y="82" font-size="10" fill="#374151">原语: AllReduce ×2/层 (Attn + FFN), NCCL Ring / NVLS</text>
    <rect x="20" y="100" width="14" height="14" fill="#fce7f3" stroke="#dc2626"/>
    <text x="40" y="112" font-size="11" font-weight="600" fill="#991b1b">PP group (4 个 · 节点内 stage 邻接)</text>
    <text x="40" y="128" font-size="10" fill="#374151">{G0,G4} · {G1,G5} · {G2,G6} · {G3,G7} ; 副本 1 类似</text>
    <text x="40" y="142" font-size="10" fill="#374151">原语: SendRecv / micro-batch / stage 边界</text>
    <rect x="430" y="40" width="14" height="14" fill="#dcfce7" stroke="#15803d"/>
    <text x="450" y="52" font-size="11" font-weight="600" fill="#166534">DP group (8 个 · 跨节点 IB)</text>
    <text x="450" y="68" font-size="10" fill="#374151">{G0,G8} · {G1,G9} · ... · {G7,G15}</text>
    <text x="450" y="82" font-size="10" fill="#374151">原语: AllReduce (训练 grad) / 无通信 (推理 = 副本)</text>
    <rect x="430" y="100" width="14" height="14" fill="#fed7aa" stroke="#9a3412"/>
    <text x="450" y="112" font-size="11" font-weight="600" fill="#9a3412">EP group (MoE 场景下叠加)</text>
    <text x="450" y="128" font-size="10" fill="#374151">通常与 TP/DP 复用 ranks; 原语: All-to-All ×2/MoE 层</text>
    <text x="450" y="142" font-size="10" fill="#374151">推理偏好: Attention DP + FFN EP (DeepSeek-V3 标杆)</text>
    <text x="20" y="172" font-size="11" font-weight="600" fill="#0f172a">拓扑映射准则 (从重到轻分配):</text>
    <text x="20" y="190" font-size="10" fill="#374151">TP / EP / CP → 节点内 NVLink (强同步, 带宽+延迟敏感)</text>
    <text x="20" y="205" font-size="10" fill="#374151">PP → 节点间 IB / RoCE (点对点小消息, 跨机友好)</text>
    <text x="450" y="190" font-size="10" fill="#374151">DP → 最外层 (可异步, 可梯度压缩)</text>
    <text x="450" y="205" font-size="10" fill="#374151">CP (长上下文) → 与 TP 嵌套, ring 内尽量同节点</text>
  </g>
</svg>
