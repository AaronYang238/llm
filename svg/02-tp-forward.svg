  </g>
  <g>
    <rect class="op-col" x="60" y="322" width="130" height="40" rx="4"/><text class="op-txt" x="125" y="340" text-anchor="middle">gate_proj / up_proj</text><text class="lbl" x="125" y="354" text-anchor="middle">intermediate/4</text>
    <rect class="op-col" x="240" y="322" width="130" height="40" rx="4"/><text class="op-txt" x="305" y="340" text-anchor="middle">gate_proj / up_proj</text><text class="lbl" x="305" y="354" text-anchor="middle">intermediate/4</text>
    <rect class="op-col" x="420" y="322" width="130" height="40" rx="4"/><text class="op-txt" x="485" y="340" text-anchor="middle">gate_proj / up_proj</text><text class="lbl" x="485" y="354" text-anchor="middle">intermediate/4</text>
    <rect class="op-col" x="600" y="322" width="130" height="40" rx="4"/><text class="op-txt" x="665" y="340" text-anchor="middle">gate_proj / up_proj</text><text class="lbl" x="665" y="354" text-anchor="middle">intermediate/4</text>
  </g>
  <g>
    <rect class="op-local" x="60" y="368" width="130" height="22" rx="4"/><text class="op-txt" x="125" y="383" text-anchor="middle">SiLU(gate) * up</text>
    <rect class="op-local" x="240" y="368" width="130" height="22" rx="4"/><text class="op-txt" x="305" y="383" text-anchor="middle">SiLU(gate) * up</text>
    <rect class="op-local" x="420" y="368" width="130" height="22" rx="4"/><text class="op-txt" x="485" y="383" text-anchor="middle">SiLU(gate) * up</text>
    <rect class="op-local" x="600" y="368" width="130" height="22" rx="4"/><text class="op-txt" x="665" y="383" text-anchor="middle">SiLU(gate) * up</text>
  </g>
  <g>
    <rect class="op-row" x="60" y="398" width="130" height="30" rx="4"/><text class="op-txt" x="125" y="417" text-anchor="middle">down_proj (partial)</text>
    <rect class="op-row" x="240" y="398" width="130" height="30" rx="4"/><text class="op-txt" x="305" y="417" text-anchor="middle">down_proj (partial)</text>
    <rect class="op-row" x="420" y="398" width="130" height="30" rx="4"/><text class="op-txt" x="485" y="417" text-anchor="middle">down_proj (partial)</text>
    <rect class="op-row" x="600" y="398" width="130" height="30" rx="4"/><text class="op-txt" x="665" y="417" text-anchor="middle">down_proj (partial)</text>
  </g>
  <g>
    <rect class="sync" x="40" y="436" width="710" height="32" rx="4"/>
    <text x="395" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">★ AllReduce (NCCL Ring/NVLS) — FFN 末尾 ★</text>
  </g>
  <g>
    <rect class="op-local" x="60" y="476" width="130" height="22" rx="4"/><text class="op-txt" x="125" y="491" text-anchor="middle">+Residual → 输出 Y</text>
    <rect class="op-local" x="240" y="476" width="130" height="22" rx="4"/><text class="op-txt" x="305" y="491" text-anchor="middle">+Residual → 输出 Y</text>
    <rect class="op-local" x="420" y="476" width="130" height="22" rx="4"/><text class="op-txt" x="485" y="491" text-anchor="middle">+Residual → 输出 Y</text>
    <rect class="op-local" x="600" y="476" width="130" height="22" rx="4"/><text class="op-txt" x="665" y="491" text-anchor="middle">+Residual → 输出 Y</text>
  </g>
  <g>
    <rect x="40" y="510" width="710" height="92" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
    <text x="395" y="530" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">每层 TP 通信代价: 2 × AllReduce, 单次 = B·S·H × 2 bytes (BF16)</text>
    <text x="60" y="552" font-size="11" fill="#451a03">• ColumnParallel (绿色): 权重按列切, 输入复制, 输出本地分片 → 无通信</text>
    <text x="60" y="568" font-size="11" fill="#451a03">• RowParallel (粉色): 权重按行切, 输入分片, 输出 partial sum → 末尾 AllReduce</text>
    <text x="60" y="584" font-size="11" fill="#451a03">• Llama-3 70B (80 层) prefill ≈ 160 次 AllReduce, ~11 ms 纯通信 (TP=8 NVLink)</text>
  </g>
</svg>
