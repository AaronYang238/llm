<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 720" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <linearGradient id="syncGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <style>
      .gpu-band{fill:#f9fafb;stroke:#9ca3af;stroke-width:1;stroke-dasharray:3,3}
      .gpu-label{font-size:12px;font-weight:600;fill:#374151}
      .op{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.2}
      .op-row{fill:#fce7f3;stroke:#be185d;stroke-width:1.2}
      .op-col{fill:#dcfce7;stroke:#15803d;stroke-width:1.2}
      .op-local{fill:#f3f4f6;stroke:#6b7280;stroke-width:1.2}
      .sync{fill:url(#syncGrad);stroke:#b45309;stroke-width:1.5}
      .op-txt{font-size:10px;fill:#0f172a;font-weight:500}
      .lbl{font-size:10px;fill:#4b5563}
      .title{font-size:15px;font-weight:700;fill:#0f172a}
    </style>
  </defs>
  <text x="390" y="22" text-anchor="middle" class="title">TP=4 在 Transformer Block 内的通信序列 (Llama / Qwen Dense)</text>
  <g>
