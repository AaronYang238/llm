    <rect class="op-col" x="240" y="134" width="130" height="40" rx="4"/><text class="op-txt" x="305" y="152" text-anchor="middle">Q,K,V (本地切片)</text><text class="lbl" x="305" y="166" text-anchor="middle">heads h/4..h/2</text>
    <rect class="op-col" x="420" y="134" width="130" height="40" rx="4"/><text class="op-txt" x="485" y="152" text-anchor="middle">Q,K,V (本地切片)</text><text class="lbl" x="485" y="166" text-anchor="middle">heads h/2..3h/4</text>
    <rect class="op-col" x="600" y="134" width="130" height="40" rx="4"/><text class="op-txt" x="665" y="152" text-anchor="middle">Q,K,V (本地切片)</text><text class="lbl" x="665" y="166" text-anchor="middle">heads 3h/4..h</text>
  </g>
  <g>
    <rect class="op-local" x="60" y="180" width="130" height="28" rx="4"/><text class="op-txt" x="125" y="198" text-anchor="middle">FlashAttention</text>
    <rect class="op-local" x="240" y="180" width="130" height="28" rx="4"/><text class="op-txt" x="305" y="198" text-anchor="middle">FlashAttention</text>
    <rect class="op-local" x="420" y="180" width="130" height="28" rx="4"/><text class="op-txt" x="485" y="198" text-anchor="middle">FlashAttention</text>
    <rect class="op-local" x="600" y="180" width="130" height="28" rx="4"/><text class="op-txt" x="665" y="198" text-anchor="middle">FlashAttention</text>
  </g>
  <g>
    <rect class="op-row" x="60" y="214" width="130" height="30" rx="4"/><text class="op-txt" x="125" y="233" text-anchor="middle">O_proj (partial)</text>
    <rect class="op-row" x="240" y="214" width="130" height="30" rx="4"/><text class="op-txt" x="305" y="233" text-anchor="middle">O_proj (partial)</text>
    <rect class="op-row" x="420" y="214" width="130" height="30" rx="4"/><text class="op-txt" x="485" y="233" text-anchor="middle">O_proj (partial)</text>
