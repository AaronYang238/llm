    <rect class="op" x="600" y="72" width="130" height="26" rx="4"/><text class="op-txt" x="665" y="89" text-anchor="middle">X [B,S,H] (复制)</text>
  </g>
  <g>
    <rect class="op-local" x="60" y="104" width="130" height="22" rx="4"/><text class="op-txt" x="125" y="119" text-anchor="middle">RMSNorm (本地)</text>
    <rect class="op-local" x="240" y="104" width="130" height="22" rx="4"/><text class="op-txt" x="305" y="119" text-anchor="middle">RMSNorm</text>
    <rect class="op-local" x="420" y="104" width="130" height="22" rx="4"/><text class="op-txt" x="485" y="119" text-anchor="middle">RMSNorm</text>
