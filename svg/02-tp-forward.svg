    <rect class="sync" x="40" y="252" width="710" height="32" rx="4"/>
    <text x="395" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">★ AllReduce (NCCL Ring/NVLS) — Attention 末尾 ★</text>
  </g>
  <g>
    <rect class="op-local" x="60" y="292" width="130" height="22" rx="4"/><text class="op-txt" x="125" y="307" text-anchor="middle">+Residual, RMSNorm</text>
