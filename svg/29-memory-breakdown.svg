<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="Inter, system-ui, sans-serif" font-size="13">
  <defs>
    <pattern id="oom" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#ffcdd2"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#e53935" stroke-width="2"/>
    </pattern>
  </defs>

  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="600">显存三大块：权重固定，KV cache 随 batch×seq 长大，是 OOM 的元凶</text>
  <text x="380" y="46" text-anchor="middle" font-size="12" fill="#546e7a">以 LLaMA-2-7B（MHA，1 MB/token）为例，单张 H100 80GB</text>

  <!-- ceiling line 80GB at y=68 -->
  <line x1="60" y1="68" x2="700" y2="68" stroke="#e53935" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="700" y="62" text-anchor="end" font-size="11" fill="#e53935">80 GB（H100 上限）</text>

  <!-- baseline -->
  <line x1="60" y1="340" x2="700" y2="340" stroke="#90a4ae"/>

  <!-- bar 1: B=1 S=2K -->
  <rect x="95"  y="292" width="90" height="48"  fill="#1e88e5"/>
  <rect x="95"  y="285" width="90" height="7"   fill="#fbc02d"/>
  <rect x="95"  y="280" width="90" height="5"   fill="#cfd8dc"/>
  <text x="140" y="272" text-anchor="middle" font-size="12" font-weight="600">~18 GB</text>
  <text x="140" y="360" text-anchor="middle" font-size="12">B=1, S=2K</text>

  <!-- bar 2: B=8 S=2K -->
  <rect x="255" y="292" width="90" height="48"  fill="#1e88e5"/>
  <rect x="255" y="238" width="90" height="54"  fill="#fbc02d"/>
  <rect x="255" y="231" width="90" height="7"   fill="#cfd8dc"/>
  <text x="300" y="223" text-anchor="middle" font-size="12" font-weight="600">~32 GB</text>
  <text x="300" y="360" text-anchor="middle" font-size="12">B=8, S=2K</text>

  <!-- bar 3: B=8 S=8K -->
  <rect x="415" y="292" width="90" height="48"  fill="#1e88e5"/>
  <rect x="415" y="74"  width="90" height="218" fill="#fbc02d"/>
  <rect x="415" y="67"  width="90" height="7"   fill="#cfd8dc"/>
  <text x="460" y="59"  text-anchor="middle" font-size="12" font-weight="600" fill="#bf360c">~78 GB（贴顶）</text>
  <text x="460" y="360" text-anchor="middle" font-size="12">B=8, S=8K</text>

  <!-- bar 4: B=16 S=8K OOM -->
  <rect x="575" y="292" width="90" height="48"  fill="#1e88e5"/>
  <rect x="575" y="68"  width="90" height="224" fill="url(#oom)" stroke="#e53935"/>
  <text x="620" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#e53935">KV 128 GB</text>
  <text x="620" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#e53935">OOM</text>
  <text x="620" y="360" text-anchor="middle" font-size="12">B=16, S=8K</text>

  <!-- note -->
  <text x="380" y="392" text-anchor="middle" font-size="11.5" fill="#546e7a">同样模型，GQA（H_kv=8）会把 KV 砍到 1/4 → B=8,S=8K 的 KV 从 64 GB 降到 16 GB（呼应 §1.2.2）</text>

  <!-- legend -->
  <g transform="translate(210, 408)" font-size="12">
    <rect x="0" y="0" width="14" height="14" fill="#1e88e5"/><text x="20" y="11">权重 14 GB（固定）</text>
    <rect x="160" y="0" width="14" height="14" fill="#fbc02d"/><text x="180" y="11">KV cache（随 B×S 长）</text>
    <rect x="340" y="0" width="14" height="14" fill="#cfd8dc"/><text x="360" y="11">激活 + 开销</text>
  </g>
</svg>
