<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#455a64"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c62828"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#212121">FlashAttention：外循环 Q tile，内循环 K/V tile，online softmax 增量累加</text>

  <!-- ===== Q matrix (left) ===== -->
  <g transform="translate(40, 70)">
    <text x="50" y="14" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">Q [S × d]</text>

    <!-- 4 row tiles, Q_1 highlighted -->
    <rect x="0" y="24" width="100" height="36" fill="#1e88e5" stroke="#0d47a1" stroke-width="2"/>
    <text x="50" y="46" text-anchor="middle" font-size="13" fill="white" font-weight="600">Q₁ (当前)</text>

    <rect x="0" y="62" width="100" height="36" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
    <text x="50" y="84" text-anchor="middle" font-size="12" fill="#0d47a1">Q₂</text>

    <rect x="0" y="100" width="100" height="36" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
    <text x="50" y="122" text-anchor="middle" font-size="12" fill="#0d47a1">Q₃</text>

    <rect x="0" y="138" width="100" height="36" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
    <text x="50" y="160" text-anchor="middle" font-size="12" fill="#0d47a1">Q₄</text>

    <text x="50" y="195" text-anchor="middle" font-size="11" fill="#546e7a">外循环：依次处理每个 Q tile</text>
  </g>

  <!-- Arrow from Q_1 into the inner loop area -->
  <line x1="150" y1="42" x2="195" y2="42" stroke="#455a64" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== K/V tiles (middle) ===== -->
  <g transform="translate(210, 70)">
    <text x="200" y="14" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">K / V tiles（内循环：对每个 Q tile 扫一遍）</text>

    <!-- 4 KV tiles arranged horizontally -->
    <rect x="0" y="24" width="80" height="56" fill="#1e88e5" stroke="#0d47a1" stroke-width="1.5"/>
    <text x="40" y="46" text-anchor="middle" font-size="12" fill="white">K₁</text>
    <text x="40" y="62" text-anchor="middle" font-size="12" fill="white">V₁</text>

    <rect x="105" y="24" width="80" height="56" fill="#1e88e5" stroke="#0d47a1" stroke-width="1.5"/>
    <text x="145" y="46" text-anchor="middle" font-size="12" fill="white">K₂</text>
    <text x="145" y="62" text-anchor="middle" font-size="12" fill="white">V₂</text>

    <rect x="210" y="24" width="80" height="56" fill="#1e88e5" stroke="#0d47a1" stroke-width="1.5"/>
    <text x="250" y="46" text-anchor="middle" font-size="12" fill="white">K₃</text>
    <text x="250" y="62" text-anchor="middle" font-size="12" fill="white">V₃</text>

    <rect x="315" y="24" width="80" height="56" fill="#1e88e5" stroke="#0d47a1" stroke-width="1.5"/>
    <text x="355" y="46" text-anchor="middle" font-size="12" fill="white">K₄</text>
    <text x="355" y="62" text-anchor="middle" font-size="12" fill="white">V₄</text>

    <!-- Iteration arrows between KV tiles -->
    <line x1="80" y1="52" x2="100" y2="52" stroke="#455a64" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="185" y1="52" x2="205" y2="52" stroke="#455a64" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="290" y1="52" x2="310" y2="52" stroke="#455a64" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- S = QK^T never materialized (red dashed box) -->
    <rect x="40" y="100" width="315" height="50" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="197" y="119" text-anchor="middle" font-size="12" font-weight="600" fill="#c62828">[S × S] 的 QKᵀ 矩阵从不 materialize 到 HBM</text>
    <text x="197" y="138" text-anchor="middle" font-size="11" fill="#c62828">只在 SMEM 内算 Q₁·Kᵢᵀ 的块（[Bᵣ × Bᵧ]），用完就丢</text>

    <text x="197" y="180" text-anchor="middle" font-size="11" fill="#546e7a">每内循环步：算一块 S_block → 更新 accumulator → 丢弃</text>
  </g>

  <!-- Arrow from KV inner loop to accumulator -->
  <line x1="620" y1="105" x2="660" y2="105" stroke="#455a64" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Accumulator (right top) ===== -->
  <g transform="translate(670, 70)">
    <text x="115" y="14" text-anchor="middle" font-size="13" font-weight="600" fill="#f57f17">Accumulator (SMEM)</text>

    <rect x="0" y="24" width="230" height="30" fill="#fbc02d" stroke="#f57f17" stroke-width="1.5"/>
    <text x="115" y="44" text-anchor="middle" font-size="12" fill="#212121">m (running max, 标量/向量)</text>

    <rect x="0" y="58" width="230" height="30" fill="#fbc02d" stroke="#f57f17" stroke-width="1.5"/>
    <text x="115" y="78" text-anchor="middle" font-size="12" fill="#212121">ℓ (running denom)</text>

    <rect x="0" y="92" width="230" height="40" fill="#fbc02d" stroke="#f57f17" stroke-width="1.5"/>
    <text x="115" y="116" text-anchor="middle" font-size="12" fill="#212121">O_acc [Bᵣ × d] (running output)</text>

    <text x="115" y="160" text-anchor="middle" font-size="11" fill="#546e7a">FP32 累加，避免长 seq 精度漂移</text>
  </g>

  <!-- Arrow from accumulator to O -->
  <line x1="785" y1="245" x2="785" y2="285" stroke="#43a047" stroke-width="2" marker-end="url(#arr)"/>
  <text x="795" y="270" font-size="11" fill="#2e7d32">内循环结束 → 写回</text>

  <!-- ===== O matrix (right bottom) ===== -->
  <g transform="translate(670, 290)">
    <text x="115" y="14" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">O [S × d]</text>

    <rect x="65" y="24" width="100" height="28" fill="#43a047" stroke="#1b5e20" stroke-width="2"/>
    <text x="115" y="43" text-anchor="middle" font-size="12" fill="white" font-weight="600">O₁ ✓</text>

    <rect x="65" y="54" width="100" height="28" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
    <text x="115" y="73" text-anchor="middle" font-size="12" fill="#1b5e20">O₂</text>

    <rect x="65" y="84" width="100" height="28" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
    <text x="115" y="103" text-anchor="middle" font-size="12" fill="#1b5e20">O₃</text>

    <rect x="65" y="114" width="100" height="28" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
    <text x="115" y="133" text-anchor="middle" font-size="12" fill="#1b5e20">O₄</text>
  </g>

  <!-- ===== Online softmax update rule (bottom) ===== -->
  <g transform="translate(40, 320)">
    <rect x="0" y="0" width="610" height="155" fill="#eceff1" stroke="#90a4ae" stroke-width="1" rx="6"/>
    <text x="305" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#37474f">每内循环步的 online softmax 更新</text>

    <text x="20" y="50" font-size="13" fill="#212121" font-family="monospace">S_block = Q_tile @ K_i.T / √d            # SMEM 内，[Bᵣ × Bᵧ]</text>
    <text x="20" y="73" font-size="13" fill="#212121" font-family="monospace">m_new   = max(m, rowmax(S_block))         # 数值稳定关键</text>
    <text x="20" y="96" font-size="13" fill="#212121" font-family="monospace">ℓ_new   = exp(m − m_new) · ℓ + Σ exp(S_block − m_new)</text>
    <text x="20" y="119" font-size="13" fill="#212121" font-family="monospace">O_acc   = exp(m − m_new) · O_acc          # 旧累加 rescale</text>
    <text x="20" y="142" font-size="13" fill="#212121" font-family="monospace">          + exp(S_block − m_new) @ V_i    # 新块贡献</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 495)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#1e88e5"/>
    <text x="22" y="11" font-size="11" fill="#37474f">输入 (Q / K / V)</text>

    <rect x="140" y="0" width="14" height="14" rx="2" fill="#fbc02d"/>
    <text x="162" y="11" font-size="11" fill="#37474f">SMEM 内累加器 (m, ℓ, O_acc)</text>

    <rect x="370" y="0" width="14" height="14" rx="2" fill="#43a047"/>
    <text x="392" y="11" font-size="11" fill="#37474f">输出 O（写回 HBM）</text>

    <rect x="540" y="0" width="14" height="14" rx="2" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="562" y="11" font-size="11" fill="#37474f">从不 materialize 到 HBM 的中间量</text>
  </g>
</svg>
