<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#455a64"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#212121">nccl-tests AllReduce busbw 随消息大小变化（8 节点 H100 + IB NDR 示意）</text>

  <!-- Plot area: x from 100 to 880, y from 80 to 420 -->
  <rect x="100" y="80" width="780" height="340" fill="#fafafa" stroke="#cfd8dc" stroke-width="1"/>

  <!-- Y axis grid (busbw, 0~600 GB/s) -->
  <line x1="100" y1="420" x2="880" y2="420" stroke="#b0bec5" stroke-width="1"/>
  <line x1="100" y1="362" x2="880" y2="362" stroke="#eceff1" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="100" y1="305" x2="880" y2="305" stroke="#eceff1" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="100" y1="248" x2="880" y2="248" stroke="#eceff1" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="100" y1="190" x2="880" y2="190" stroke="#eceff1" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="100" y1="133" x2="880" y2="133" stroke="#eceff1" stroke-width="1" stroke-dasharray="2 3"/>

  <text x="92" y="424" text-anchor="end" font-size="11" fill="#37474f">0</text>
  <text x="92" y="366" text-anchor="end" font-size="11" fill="#37474f">100</text>
  <text x="92" y="309" text-anchor="end" font-size="11" fill="#37474f">200</text>
  <text x="92" y="252" text-anchor="end" font-size="11" fill="#37474f">300</text>
  <text x="92" y="194" text-anchor="end" font-size="11" fill="#37474f">400</text>
  <text x="92" y="137" text-anchor="end" font-size="11" fill="#37474f">500</text>
  <text x="92" y="80" text-anchor="end" font-size="11" fill="#37474f">600</text>

  <text x="50" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#37474f" transform="rotate(-90 50 250)">busbw (GB/s)</text>

  <!-- X axis: log scale, 8B to 8GB, 10 decades -->
  <line x1="100" y1="420" x2="100" y2="425" stroke="#37474f"/>
  <line x1="178" y1="420" x2="178" y2="425" stroke="#37474f"/>
  <line x1="256" y1="420" x2="256" y2="425" stroke="#37474f"/>
  <line x1="334" y1="420" x2="334" y2="425" stroke="#37474f"/>
  <line x1="412" y1="420" x2="412" y2="425" stroke="#37474f"/>
  <line x1="490" y1="420" x2="490" y2="425" stroke="#37474f"/>
  <line x1="568" y1="420" x2="568" y2="425" stroke="#37474f"/>
  <line x1="646" y1="420" x2="646" y2="425" stroke="#37474f"/>
  <line x1="724" y1="420" x2="724" y2="425" stroke="#37474f"/>
  <line x1="802" y1="420" x2="802" y2="425" stroke="#37474f"/>
  <line x1="880" y1="420" x2="880" y2="425" stroke="#37474f"/>

  <text x="100" y="440" text-anchor="middle" font-size="11" fill="#37474f">8 B</text>
  <text x="256" y="440" text-anchor="middle" font-size="11" fill="#37474f">8 KB</text>
  <text x="412" y="440" text-anchor="middle" font-size="11" fill="#37474f">8 MB</text>
  <text x="568" y="440" text-anchor="middle" font-size="11" fill="#37474f">8 GB</text>
  <text x="178" y="440" text-anchor="middle" font-size="10" fill="#90a4ae">1 KB</text>
  <text x="334" y="440" text-anchor="middle" font-size="10" fill="#90a4ae">1 MB</text>
  <text x="490" y="440" text-anchor="middle" font-size="10" fill="#90a4ae">1 GB</text>

  <text x="490" y="465" text-anchor="middle" font-size="12" font-weight="600" fill="#37474f">消息大小（log scale）</text>

  <!-- Theoretical link bandwidth dotted line at ~570 GB/s (close to NDR aggregate) -->
  <line x1="100" y1="100" x2="880" y2="100" stroke="#90a4ae" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="870" y="95" text-anchor="end" font-size="10" fill="#546e7a">理论上限 ≈ 链路带宽 × 节点数 (~570 GB/s)</text>

  <!-- Main curve: normal (8-node H100 + SHARP), bright blue, S shape rising from near 0 to ~550 -->
  <path d="M 100,418 L 178,415 L 220,410 L 256,400 L 290,378 L 320,348 L 350,310 L 390,260 L 430,195 L 470,150 L 520,125 L 580,112 L 660,107 L 780,105 L 880,104"
        fill="none" stroke="#1e88e5" stroke-width="2.5"/>

  <!-- SHARP off curve (Ring only): similar shape but caps at ~380 GB/s -->
  <path d="M 100,418 L 178,416 L 220,412 L 256,404 L 290,386 L 320,360 L 350,328 L 390,290 L 430,245 L 470,215 L 520,200 L 580,190 L 660,185 L 780,183 L 880,182"
        fill="none" stroke="#43a047" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Single QP curve: saturates ~30 GB/s -->
  <path d="M 100,418 L 178,417 L 256,415 L 320,410 L 390,405 L 430,403 L 470,402 L 520,402 L 580,401 L 660,400 L 880,400"
        fill="none" stroke="#fbc02d" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- GDR off / host bounce: flat at ~10 GB/s -->
  <path d="M 100,418 L 256,417 L 320,416 L 390,415 L 470,414 L 580,413 L 880,412"
        fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Phase annotations -->
  <g transform="translate(0, 0)">
    <line x1="220" y1="80" x2="220" y2="420" stroke="#cfd8dc" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="400" y1="80" x2="400" y2="420" stroke="#cfd8dc" stroke-width="1" stroke-dasharray="3 4"/>

    <text x="155" y="75" text-anchor="middle" font-size="11" fill="#1565c0">latency-bound</text>
    <text x="155" y="89" text-anchor="middle" font-size="10" fill="#546e7a">(LL protocol)</text>

    <text x="310" y="75" text-anchor="middle" font-size="11" fill="#1565c0">transition</text>
    <text x="310" y="89" text-anchor="middle" font-size="10" fill="#546e7a">(LL128 → Simple)</text>

    <text x="640" y="75" text-anchor="middle" font-size="11" fill="#1565c0">bandwidth-bound</text>
    <text x="640" y="89" text-anchor="middle" font-size="10" fill="#546e7a">(Simple，饱和)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(110, 480)">
    <line x1="0" y1="-5" x2="30" y2="-5" stroke="#1e88e5" stroke-width="2.5"/>
    <text x="36" y="-1" font-size="11" fill="#37474f">正常（多 HCA × 多 QP + SHARP）</text>

    <line x1="240" y1="-5" x2="270" y2="-5" stroke="#43a047" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="276" y="-1" font-size="11" fill="#37474f">SHARP 关（Ring，~−33%）</text>

    <line x1="470" y1="-5" x2="500" y2="-5" stroke="#fbc02d" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="506" y="-1" font-size="11" fill="#37474f">单 QP（卡在 ~30 GB/s）</text>

    <line x1="680" y1="-5" x2="710" y2="-5" stroke="#e53935" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="716" y="-1" font-size="11" fill="#37474f">GDR 关 / host bounce</text>
  </g>
</svg>
