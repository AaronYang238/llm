<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#455a64"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#212121">多模态推理：一张图怎么变成 LLM 能吃的 token</text>

  <!-- ===== 主路径 ===== -->
  <text x="40" y="62" font-size="13" font-weight="600" fill="#1565c0">图像 → token 的四步流水</text>

  <!-- Step 1: image -->
  <g transform="translate(40, 78)">
    <rect x="0" y="0" width="130" height="80" rx="6" fill="#eceff1" stroke="#90a4ae"/>
    <text x="65" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#37474f">① 原始图像</text>
    <rect x="20" y="32" width="90" height="38" rx="3" fill="#bbdefb" stroke="#1565c0"/>
    <text x="65" y="50" text-anchor="middle" font-size="9" fill="#0d47a1">448×448</text>
    <text x="65" y="63" text-anchor="middle" font-size="9" fill="#0d47a1">RGB 像素</text>
  </g>
  <line x1="170" y1="118" x2="208" y2="118" stroke="#455a64" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: vision encoder -->
  <g transform="translate(210, 78)">
    <rect x="0" y="0" width="160" height="80" rx="6" fill="#e3f2fd" stroke="#1565c0"/>
    <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#0d47a1">② Vision Encoder</text>
    <text x="80" y="40" text-anchor="middle" font-size="9" fill="#37474f">ViT：切 patch + 自注意力</text>
    <text x="80" y="56" text-anchor="middle" font-size="9" fill="#37474f">→ patch 特征序列</text>
    <text x="80" y="70" text-anchor="middle" font-size="8" fill="#546e7a">如 14×14 patch = 256 个特征</text>
  </g>
  <line x1="370" y1="118" x2="408" y2="118" stroke="#455a64" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: projector -->
  <g transform="translate(410, 78)">
    <rect x="0" y="0" width="160" height="80" rx="6" fill="#fff3e0" stroke="#f57f17"/>
    <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">③ Projector</text>
    <text x="80" y="40" text-anchor="middle" font-size="9" fill="#37474f">MLP / Q-Former / pixel</text>
    <text x="80" y="54" text-anchor="middle" font-size="9" fill="#37474f">shuffle：投影到 LLM</text>
    <text x="80" y="68" text-anchor="middle" font-size="9" fill="#37474f">词向量空间</text>
  </g>
  <line x1="570" y1="118" x2="608" y2="118" stroke="#455a64" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: image tokens -->
  <g transform="translate(610, 78)">
    <rect x="0" y="0" width="180" height="80" rx="6" fill="#e8f5e9" stroke="#2e7d32"/>
    <text x="90" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20">④ Image Tokens</text>
    <text x="90" y="40" text-anchor="middle" font-size="9" fill="#37474f">和文本 token 同维度的</text>
    <text x="90" y="54" text-anchor="middle" font-size="9" fill="#37474f">"伪 token"，可直接拼接</text>
    <text x="90" y="68" text-anchor="middle" font-size="8" fill="#546e7a">256 个 image token</text>
  </g>

  <text x="810" y="120" font-size="10" fill="#546e7a">关键：图像最终</text>
  <text x="810" y="134" font-size="10" fill="#546e7a">变成一串 token，</text>
  <text x="810" y="148" font-size="10" fill="#546e7a">和文本无差别</text>

  <!-- ===== 拼接进 LLM ===== -->
  <text x="40" y="196" font-size="13" font-weight="600" fill="#6a1b9a">⑤ 图像 token 插进文本序列，一起喂 LLM（统一 attention）</text>

  <g transform="translate(40, 210)">
    <!-- text tokens -->
    <rect x="0" y="0" width="50" height="34" rx="3" fill="#bbdefb" stroke="#1565c0"/>
    <text x="25" y="21" text-anchor="middle" font-size="9" fill="#0d47a1">描述</text>
    <rect x="54" y="0" width="50" height="34" rx="3" fill="#bbdefb" stroke="#1565c0"/>
    <text x="79" y="21" text-anchor="middle" font-size="9" fill="#0d47a1">这张</text>
    <rect x="108" y="0" width="50" height="34" rx="3" fill="#bbdefb" stroke="#1565c0"/>
    <text x="133" y="21" text-anchor="middle" font-size="9" fill="#0d47a1">图：</text>
    <!-- image placeholder -->
    <rect x="166" y="0" width="40" height="34" rx="3" fill="#c8e6c9" stroke="#2e7d32"/>
    <text x="186" y="21" text-anchor="middle" font-size="9" fill="#1b5e20">img₁</text>
    <rect x="210" y="0" width="40" height="34" rx="3" fill="#c8e6c9" stroke="#2e7d32"/>
    <text x="230" y="21" text-anchor="middle" font-size="9" fill="#1b5e20">img₂</text>
    <text x="270" y="21" text-anchor="middle" font-size="11" fill="#546e7a">... (256 个) ...</text>
    <rect x="340" y="0" width="40" height="34" rx="3" fill="#c8e6c9" stroke="#2e7d32"/>
    <text x="360" y="21" text-anchor="middle" font-size="9" fill="#1b5e20">img₂₅₆</text>
    <!-- text again -->
    <rect x="384" y="0" width="50" height="34" rx="3" fill="#bbdefb" stroke="#1565c0"/>
    <text x="409" y="21" text-anchor="middle" font-size="9" fill="#0d47a1">里有</text>
    <rect x="438" y="0" width="50" height="34" rx="3" fill="#bbdefb" stroke="#1565c0"/>
    <text x="463" y="21" text-anchor="middle" font-size="9" fill="#0d47a1">什么</text>

    <line x1="494" y1="17" x2="528" y2="17" stroke="#455a64" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="530" y="-3" width="120" height="40" rx="5" fill="#90a4ae" stroke="#546e7a"/>
    <text x="590" y="14" text-anchor="middle" font-size="10" fill="white">LLM Decoder</text>
    <text x="590" y="28" text-anchor="middle" font-size="9" fill="#eceff1">（阶段 1 的结构）</text>
  </g>

  <text x="40" y="278" font-size="10" fill="#c62828">注意：1 张图 = 256+ token，比一句话长得多 → 多模态的 prefill 和 KV 成本远高于纯文本（§10.5.3）</text>

  <!-- ===== 三模型对比 ===== -->
  <line x1="40" y1="298" x2="920" y2="298" stroke="#cfd8dc" stroke-width="1"/>
  <text x="40" y="324" font-size="13" font-weight="600" fill="#1565c0">三种主流多模态模型的 token 路径差异</text>

  <g transform="translate(40, 338)">
    <rect x="0" y="0" width="285" height="100" rx="6" fill="#e3f2fd" stroke="#1565c0"/>
    <text x="142" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">LLaVA</text>
    <text x="12" y="44" font-size="9" fill="#37474f">• vision encoder：CLIP ViT</text>
    <text x="12" y="60" font-size="9" fill="#37474f">• projector：简单 MLP</text>
    <text x="12" y="76" font-size="9" fill="#37474f">• 固定分辨率，token 数固定</text>
    <text x="12" y="92" font-size="9" fill="#546e7a">最简洁，理解多模态的入门</text>
  </g>

  <g transform="translate(338, 338)">
    <rect x="0" y="0" width="285" height="100" rx="6" fill="#fff3e0" stroke="#f57f17"/>
    <text x="142" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">Qwen-VL</text>
    <text x="12" y="44" font-size="9" fill="#37474f">• 动态分辨率（naive dynamic res）</text>
    <text x="12" y="60" font-size="9" fill="#37474f">• 大图更多 token，小图更少</text>
    <text x="12" y="76" font-size="9" fill="#37474f">• 支持视频（多帧 → 多组 token）</text>
    <text x="12" y="92" font-size="9" fill="#546e7a">分辨率自适应，省 token</text>
  </g>

  <g transform="translate(636, 338)">
    <rect x="0" y="0" width="284" height="100" rx="6" fill="#e8f5e9" stroke="#2e7d32"/>
    <text x="142" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1b5e20">InternVL</text>
    <text x="12" y="44" font-size="9" fill="#37474f">• 大 vision encoder（InternViT）</text>
    <text x="12" y="60" font-size="9" fill="#37474f">• pixel shuffle 压 token 数</text>
    <text x="12" y="76" font-size="9" fill="#37474f">• 切图 tiling 处理高分辨率</text>
    <text x="12" y="92" font-size="9" fill="#546e7a">高分辨率 + token 压缩</text>
  </g>

  <!-- 共性 -->
  <rect x="40" y="452" width="880" height="56" rx="6" fill="#f3e5f5" stroke="#8e24aa"/>
  <text x="58" y="474" font-size="11" font-weight="600" fill="#6a1b9a">共同骨架（差异只在编码器/投影器/分辨率策略）：</text>
  <text x="58" y="494" font-size="10" fill="#37474f">图像 → vision encoder → projector → image token → 插进文本序列 → LLM。后半段（LLM decode）和纯文本完全一样，复用阶段 1–8 的全部技术。</text>

  <!-- Legend -->
  <g transform="translate(40, 524)">
    <rect x="0" y="0" width="13" height="13" fill="#bbdefb"/>
    <text x="19" y="11" font-size="10" fill="#37474f">文本 token</text>
    <rect x="110" y="0" width="13" height="13" fill="#c8e6c9"/>
    <text x="129" y="11" font-size="10" fill="#37474f">图像 token</text>
    <rect x="220" y="0" width="13" height="13" fill="#e3f2fd" stroke="#1565c0"/>
    <text x="239" y="11" font-size="10" fill="#37474f">视觉编码</text>
    <rect x="320" y="0" width="13" height="13" fill="#fff3e0" stroke="#f57f17"/>
    <text x="339" y="11" font-size="10" fill="#37474f">投影器</text>
  </g>
</svg>
