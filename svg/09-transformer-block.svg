<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 880" font-family="Inter, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
  </defs>

  <text x="400" y="24" text-anchor="middle" font-size="16" font-weight="600">LLaMA-style Decoder Block (GQA + SwiGLU + RoPE)</text>

  <!-- Input -->
  <rect x="290" y="44" width="220" height="32" rx="4" fill="#cfd8dc" stroke="#546e7a"/>
  <text x="400" y="64" text-anchor="middle">Input  x ∈ [B, S, D]</text>

  <!-- Attention sub-block left bar -->
  <text x="60" y="112" font-weight="600" fill="#1e88e5">Attention</text>
  <line x1="48" y1="120" x2="48" y2="430" stroke="#1e88e5" stroke-width="3" opacity="0.25"/>

  <!-- Residual fork 1 (from input to first +) -->
  <path d="M 400 76 L 400 84 L 100 84 L 100 410 L 384 410" fill="none" stroke="#43a047" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="78" y="250" font-size="11" fill="#43a047" transform="rotate(-90 78 250)">residual</text>

  <!-- RMSNorm 1 -->
  <line x1="400" y1="76" x2="400" y2="100" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="320" y="100" width="160" height="32" rx="4" fill="#42a5f5" stroke="#1976d2"/>
  <text x="400" y="120" text-anchor="middle" fill="white">RMSNorm</text>

  <!-- QKV -->
  <line x1="400" y1="132" x2="220" y2="155" stroke="#455a64" marker-end="url(#arr)"/>
  <line x1="400" y1="132" x2="400" y2="155" stroke="#455a64" marker-end="url(#arr)"/>
  <line x1="400" y1="132" x2="580" y2="155" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="160" y="155" width="120" height="32" rx="4" fill="#1e88e5" stroke="#0d47a1"/>
  <text x="220" y="175" text-anchor="middle" fill="white">W_Q [D, H·d]</text>
  <rect x="340" y="155" width="120" height="32" rx="4" fill="#1e88e5" stroke="#0d47a1"/>
  <text x="400" y="175" text-anchor="middle" fill="white">W_K [D, H_kv·d]</text>
  <rect x="520" y="155" width="120" height="32" rx="4" fill="#1e88e5" stroke="#0d47a1"/>
  <text x="580" y="175" text-anchor="middle" fill="white">W_V [D, H_kv·d]</text>

  <text x="400" y="208" text-anchor="middle" font-size="11" fill="#546e7a">GQA：H_kv 个 KV head 被 H/H_kv 个 Q head 共享 → KV cache 缩 H/H_kv 倍</text>

  <!-- RoPE -->
  <line x1="220" y1="187" x2="220" y2="225" stroke="#455a64" marker-end="url(#arr)"/>
  <line x1="400" y1="187" x2="400" y2="225" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="180" y="225" width="80" height="28" rx="4" fill="#fbc02d" stroke="#f57f17"/>
  <text x="220" y="244" text-anchor="middle">RoPE(Q)</text>
  <rect x="360" y="225" width="80" height="28" rx="4" fill="#fbc02d" stroke="#f57f17"/>
  <text x="400" y="244" text-anchor="middle">RoPE(K)</text>

  <!-- KV cache append -->
  <line x1="580" y1="187" x2="570" y2="225" stroke="#f57f17" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <rect x="500" y="225" width="140" height="28" rx="4" fill="#fff8e1" stroke="#f57f17" stroke-dasharray="3 2"/>
  <text x="570" y="244" text-anchor="middle" font-size="11" fill="#bf360c">append → KV cache</text>

  <!-- Attention core -->
  <line x1="220" y1="253" x2="320" y2="280" stroke="#455a64" marker-end="url(#arr)"/>
  <line x1="400" y1="253" x2="400" y2="280" stroke="#455a64" marker-end="url(#arr)"/>
  <line x1="570" y1="253" x2="480" y2="280" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="280" y="280" width="240" height="40" rx="4" fill="#e53935" stroke="#b71c1c"/>
  <text x="400" y="298" text-anchor="middle" fill="white" font-weight="600">Attention</text>
  <text x="400" y="314" text-anchor="middle" fill="white" font-size="11">softmax(Q · K^T / √d) · V</text>

  <!-- W_O -->
  <line x1="400" y1="320" x2="400" y2="345" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="320" y="345" width="160" height="32" rx="4" fill="#1e88e5" stroke="#0d47a1"/>
  <text x="400" y="365" text-anchor="middle" fill="white">W_O [H·d, D]</text>

  <!-- Residual + -->
  <line x1="400" y1="377" x2="400" y2="396" stroke="#455a64" marker-end="url(#arr)"/>
  <circle cx="400" cy="410" r="14" fill="#fff" stroke="#43a047" stroke-width="2"/>
  <text x="400" y="415" text-anchor="middle" font-weight="700" fill="#43a047">+</text>

  <!-- FFN sub-block left bar -->
  <text x="60" y="472" font-weight="600" fill="#1e88e5">FFN (SwiGLU)</text>
  <line x1="48" y1="480" x2="48" y2="730" stroke="#1e88e5" stroke-width="3" opacity="0.25"/>

  <!-- Residual fork 2 (from after attn+ down to second +) -->
  <path d="M 400 424 L 400 436 L 120 436 L 120 700 L 384 700" fill="none" stroke="#43a047" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- RMSNorm 2 -->
  <line x1="400" y1="436" x2="400" y2="460" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="320" y="460" width="160" height="32" rx="4" fill="#42a5f5" stroke="#1976d2"/>
  <text x="400" y="480" text-anchor="middle" fill="white">RMSNorm</text>

  <!-- Gate / Up -->
  <line x1="400" y1="492" x2="280" y2="515" stroke="#455a64" marker-end="url(#arr)"/>
  <line x1="400" y1="492" x2="520" y2="515" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="200" y="515" width="160" height="32" rx="4" fill="#1e88e5" stroke="#0d47a1"/>
  <text x="280" y="535" text-anchor="middle" fill="white">W_gate [D, d_ff]</text>
  <rect x="440" y="515" width="160" height="32" rx="4" fill="#1e88e5" stroke="#0d47a1"/>
  <text x="520" y="535" text-anchor="middle" fill="white">W_up [D, d_ff]</text>

  <!-- SiLU -->
  <line x1="280" y1="547" x2="280" y2="565" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="220" y="565" width="120" height="28" rx="4" fill="#fbc02d" stroke="#f57f17"/>
  <text x="280" y="584" text-anchor="middle">SiLU(gate)</text>

  <!-- × -->
  <line x1="280" y1="593" x2="386" y2="615" stroke="#455a64" marker-end="url(#arr)"/>
  <line x1="520" y1="547" x2="414" y2="615" stroke="#455a64" marker-end="url(#arr)"/>
  <circle cx="400" cy="620" r="14" fill="#fff" stroke="#fbc02d" stroke-width="2"/>
  <text x="400" y="625" text-anchor="middle" font-weight="700" fill="#f57f17">×</text>

  <!-- W_down -->
  <line x1="400" y1="634" x2="400" y2="650" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="320" y="650" width="160" height="32" rx="4" fill="#1e88e5" stroke="#0d47a1"/>
  <text x="400" y="670" text-anchor="middle" fill="white">W_down [d_ff, D]</text>

  <!-- Residual + -->
  <line x1="400" y1="682" x2="400" y2="686" stroke="#455a64" marker-end="url(#arr)"/>
  <circle cx="400" cy="700" r="14" fill="#fff" stroke="#43a047" stroke-width="2"/>
  <text x="400" y="705" text-anchor="middle" font-weight="700" fill="#43a047">+</text>

  <!-- Output -->
  <line x1="400" y1="714" x2="400" y2="740" stroke="#455a64" marker-end="url(#arr)"/>
  <rect x="290" y="740" width="220" height="32" rx="4" fill="#cfd8dc" stroke="#546e7a"/>
  <text x="400" y="760" text-anchor="middle">Output  y ∈ [B, S, D]</text>

  <!-- Legend -->
  <g transform="translate(60, 815)" font-size="12">
    <rect x="0" y="0" width="14" height="14" fill="#1e88e5"/><text x="20" y="11">Linear（标权重形状）</text>
    <rect x="170" y="0" width="14" height="14" fill="#42a5f5"/><text x="190" y="11">Norm</text>
    <rect x="250" y="0" width="14" height="14" fill="#fbc02d"/><text x="270" y="11">逐元素 / 位置编码</text>
    <rect x="420" y="0" width="14" height="14" fill="#e53935"/><text x="440" y="11">Attention 核心</text>
    <line x1="560" y1="7" x2="600" y2="7" stroke="#43a047" stroke-dasharray="5 3"/><text x="608" y="11" fill="#43a047">residual</text>
  </g>
</svg>
