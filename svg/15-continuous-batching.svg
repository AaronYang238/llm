<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#455a64"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#212121">Static Batching vs Continuous Batching（4 条请求，长度不一）</text>

  <!-- time axis label -->
  <text x="480" y="512" text-anchor="middle" font-size="12" font-weight="600" fill="#37474f">时间步（每格 = 1 个 decode step）→</text>

  <!-- ============ TOP: Static batching ============ -->
  <text x="40" y="62" font-size="14" font-weight="600" fill="#c62828">(A) Static Batching：整批一起进、一起出，短请求等长请求</text>

  <!-- grid: x from 120 to 840, 16 steps, each 45px -->
  <!-- rows for R1-R4 -->
  <g transform="translate(0, 74)">
    <!-- step grid lines -->
    <g stroke="#eceff1" stroke-width="1">
      <line x1="120" y1="0" x2="120" y2="160"/>
      <line x1="840" y1="0" x2="840" y2="160"/>
    </g>

    <!-- R1: 4 steps work, then wait until step 14 -->
    <text x="40" y="22" font-size="12" fill="#37474f">R1 (4 tok)</text>
    <rect x="120" y="8" width="180" height="24" fill="#43a047" stroke="#1b5e20"/>
    <text x="210" y="25" text-anchor="middle" font-size="10" fill="white">生成 4 tok</text>
    <rect x="300" y="8" width="450" height="24" fill="#cfd8dc" stroke="#90a4ae" stroke-dasharray="4 3"/>
    <text x="525" y="25" text-anchor="middle" font-size="10" fill="#607d8b">空转等待（GPU 浪费）</text>

    <!-- R2: 8 steps -->
    <text x="40" y="58" font-size="12" fill="#37474f">R2 (8 tok)</text>
    <rect x="120" y="44" width="360" height="24" fill="#43a047" stroke="#1b5e20"/>
    <text x="300" y="61" text-anchor="middle" font-size="10" fill="white">生成 8 tok</text>
    <rect x="480" y="44" width="270" height="24" fill="#cfd8dc" stroke="#90a4ae" stroke-dasharray="4 3"/>
    <text x="615" y="61" text-anchor="middle" font-size="10" fill="#607d8b">空转等待</text>

    <!-- R3: 16 steps (longest) -->
    <text x="40" y="94" font-size="12" fill="#37474f">R3 (16 tok)</text>
    <rect x="120" y="80" width="630" height="24" fill="#43a047" stroke="#1b5e20"/>
    <text x="435" y="97" text-anchor="middle" font-size="10" fill="white">生成 16 tok（最长，整批被它拖住）</text>

    <!-- R4: 6 steps -->
    <text x="40" y="130" font-size="12" fill="#37474f">R4 (6 tok)</text>
    <rect x="120" y="116" width="270" height="24" fill="#43a047" stroke="#1b5e20"/>
    <text x="255" y="133" text-anchor="middle" font-size="10" fill="white">生成 6 tok</text>
    <rect x="390" y="116" width="360" height="24" fill="#cfd8dc" stroke="#90a4ae" stroke-dasharray="4 3"/>
    <text x="570" y="133" text-anchor="middle" font-size="10" fill="#607d8b">空转等待</text>

    <!-- batch boundary -->
    <line x1="750" y1="-2" x2="750" y2="148" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="755" y="158" font-size="10" fill="#c62828">整批完成，才能收新请求</text>
  </g>

  <text x="40" y="252" font-size="11" fill="#c62828">→ GPU 利用率低：~55% 的 slot 在空转；新请求必须等整批结束</text>

  <!-- Divider -->
  <line x1="40" y1="266" x2="920" y2="266" stroke="#cfd8dc" stroke-width="1"/>

  <!-- ============ BOTTOM: Continuous batching ============ -->
  <text x="40" y="296" font-size="14" font-weight="600" fill="#2e7d32">(B) Continuous Batching：请求完成立即退出，空位立即补新请求</text>

  <g transform="translate(0, 308)">
    <g stroke="#eceff1" stroke-width="1">
      <line x1="120" y1="0" x2="120" y2="160"/>
      <line x1="840" y1="0" x2="840" y2="160"/>
    </g>

    <!-- R1: 4 steps then R5 fills in -->
    <text x="40" y="22" font-size="12" fill="#37474f">slot 1</text>
    <rect x="120" y="8" width="180" height="24" fill="#43a047" stroke="#1b5e20"/>
    <text x="210" y="25" text-anchor="middle" font-size="10" fill="white">R1 (4 tok)</text>
    <rect x="300" y="8" width="270" height="24" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="435" y="25" text-anchor="middle" font-size="10" fill="white">R5 立即补入</text>
    <rect x="570" y="8" width="180" height="24" fill="#fbc02d" stroke="#f57f17"/>
    <text x="660" y="25" text-anchor="middle" font-size="10" fill="#212121">R7</text>

    <!-- slot 2: R2 then R6 -->
    <text x="40" y="58" font-size="12" fill="#37474f">slot 2</text>
    <rect x="120" y="44" width="360" height="24" fill="#43a047" stroke="#1b5e20"/>
    <text x="300" y="61" text-anchor="middle" font-size="10" fill="white">R2 (8 tok)</text>
    <rect x="480" y="44" width="270" height="24" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="615" y="61" text-anchor="middle" font-size="10" fill="white">R6 补入</text>

    <!-- slot 3: R3 (longest, runs full) -->
    <text x="40" y="94" font-size="12" fill="#37474f">slot 3</text>
    <rect x="120" y="80" width="630" height="24" fill="#43a047" stroke="#1b5e20"/>
    <text x="435" y="97" text-anchor="middle" font-size="10" fill="white">R3 (16 tok)</text>

    <!-- slot 4: R4 then R8 then R9 -->
    <text x="40" y="130" font-size="12" fill="#37474f">slot 4</text>
    <rect x="120" y="116" width="270" height="24" fill="#43a047" stroke="#1b5e20"/>
    <text x="255" y="133" text-anchor="middle" font-size="10" fill="white">R4 (6 tok)</text>
    <rect x="390" y="116" width="225" height="24" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="502" y="133" text-anchor="middle" font-size="10" fill="white">R8 补入</text>
    <rect x="615" y="116" width="135" height="24" fill="#fbc02d" stroke="#f57f17"/>
    <text x="682" y="133" text-anchor="middle" font-size="10" fill="#212121">R9</text>

    <line x1="750" y1="-2" x2="750" y2="148" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="615" y="158" font-size="10" fill="#2e7d32">同样时间完成 9 条请求（vs 静态 4 条）</text>
  </g>

  <text x="40" y="486" font-size="11" fill="#2e7d32">→ GPU 利用率高：空位立即被新请求填满；每个 step 重新组 batch（iteration-level scheduling）</text>

  <!-- Legend -->
  <g transform="translate(40, 500)">
    <rect x="0" y="0" width="13" height="13" fill="#43a047"/>
    <text x="19" y="11" font-size="10" fill="#37474f">首批请求</text>
    <rect x="100" y="0" width="13" height="13" fill="#1e88e5"/>
    <text x="119" y="11" font-size="10" fill="#37474f">补入的新请求</text>
    <rect x="230" y="0" width="13" height="13" fill="#fbc02d"/>
    <text x="249" y="11" font-size="10" fill="#37474f">再补入</text>
    <rect x="320" y="0" width="13" height="13" fill="#cfd8dc" stroke="#90a4ae" stroke-dasharray="3 2"/>
    <text x="339" y="11" font-size="10" fill="#37474f">空转（GPU 浪费）</text>
  </g>
</svg>
