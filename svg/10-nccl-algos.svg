<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#455a64"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#212121">NCCL 四种 AllReduce 算法的拓扑结构（N=4 示意）</text>

  <!-- ============ Quadrant 1: Ring (top-left) ============ -->
  <g transform="translate(40, 60)">
    <text x="200" y="18" text-anchor="middle" font-size="14" font-weight="600" fill="#212121">Ring</text>
    <text x="200" y="36" text-anchor="middle" font-size="11" fill="#546e7a">2(N−1) 步｜busbw 上限 ≈ BW_link</text>

    <circle cx="130" cy="110" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="130" y="115" text-anchor="middle" font-size="12" fill="white">G0</text>
    <circle cx="270" cy="110" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="270" y="115" text-anchor="middle" font-size="12" fill="white">G1</text>
    <circle cx="270" cy="210" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="270" y="215" text-anchor="middle" font-size="12" fill="white">G2</text>
    <circle cx="130" cy="210" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="130" y="215" text-anchor="middle" font-size="12" fill="white">G3</text>

    <line x1="154" y1="110" x2="244" y2="110" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="270" y1="134" x2="270" y2="184" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="246" y1="210" x2="156" y2="210" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="130" y1="186" x2="130" y2="136" stroke="#455a64" stroke-width="1.5" marker-end="url(#arrow)"/>

    <text x="200" y="252" text-anchor="middle" font-size="11" fill="#37474f">每步发收 M/N 字节，单方向流过链路</text>
  </g>

  <!-- ============ Quadrant 2: Tree (top-right) ============ -->
  <g transform="translate(520, 60)">
    <text x="200" y="18" text-anchor="middle" font-size="14" font-weight="600" fill="#212121">Tree (binary)</text>
    <text x="200" y="36" text-anchor="middle" font-size="11" fill="#546e7a">2·log₂(N) 步｜小消息 latency 最优</text>

    <circle cx="200" cy="90" r="22" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="200" y="95" text-anchor="middle" font-size="12" fill="white">G0</text>
    <text x="240" y="90" font-size="10" fill="#b71c1c">root</text>

    <circle cx="120" cy="170" r="22" fill="#fbc02d" stroke="#f57f17" stroke-width="1.5"/>
    <text x="120" y="175" text-anchor="middle" font-size="12" fill="#212121">G1</text>
    <circle cx="280" cy="170" r="22" fill="#fbc02d" stroke="#f57f17" stroke-width="1.5"/>
    <text x="280" y="175" text-anchor="middle" font-size="12" fill="#212121">G2</text>
    <circle cx="280" cy="230" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="280" y="235" text-anchor="middle" font-size="12" fill="white">G3</text>

    <line x1="186" y1="108" x2="134" y2="152" stroke="#455a64" stroke-width="1.5"/>
    <line x1="214" y1="108" x2="266" y2="152" stroke="#455a64" stroke-width="1.5"/>
    <line x1="280" y1="192" x2="280" y2="208" stroke="#455a64" stroke-width="1.5"/>

    <text x="200" y="272" text-anchor="middle" font-size="11" fill="#37474f">先 reduce 到 root，再广播下发</text>
  </g>

  <!-- ============ Quadrant 3: NVLS (bottom-left) ============ -->
  <g transform="translate(40, 330)">
    <text x="200" y="18" text-anchor="middle" font-size="14" font-weight="600" fill="#212121">NVLS (NVLink SHARP)</text>
    <text x="200" y="36" text-anchor="middle" font-size="11" fill="#546e7a">1 round-trip｜节点内 busbw 翻倍</text>

    <circle cx="90" cy="110" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="90" y="115" text-anchor="middle" font-size="12" fill="white">G0</text>
    <circle cx="310" cy="110" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="310" y="115" text-anchor="middle" font-size="12" fill="white">G1</text>
    <circle cx="90" cy="200" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="90" y="205" text-anchor="middle" font-size="12" fill="white">G2</text>
    <circle cx="310" cy="200" r="22" fill="#1e88e5" stroke="#1565c0" stroke-width="1.5"/>
    <text x="310" y="205" text-anchor="middle" font-size="12" fill="white">G3</text>

    <rect x="170" y="135" width="60" height="40" rx="6" fill="#43a047" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="200" y="160" text-anchor="middle" font-size="14" font-weight="600" fill="white">Σ</text>
    <text x="200" y="190" text-anchor="middle" font-size="9" fill="#1b5e20">NVSwitch 内 reduce</text>

    <line x1="112" y1="115" x2="170" y2="140" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <line x1="288" y1="115" x2="230" y2="140" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <line x1="112" y1="200" x2="170" y2="170" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <line x1="288" y1="200" x2="230" y2="170" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow-green)"/>

    <text x="200" y="252" text-anchor="middle" font-size="11" fill="#37474f">所有 GPU 同时上行 + 下行，1 跳完成</text>
  </g>

  <!-- ============ Quadrant 4: Double Binary Tree (bottom-right) ============ -->
  <g transform="translate(520, 330)">
    <text x="200" y="18" text-anchor="middle" font-size="14" font-weight="600" fill="#212121">Double Binary Tree</text>
    <text x="200" y="36" text-anchor="middle" font-size="11" fill="#546e7a">两棵互补树并行｜中消息最佳</text>

    <!-- Tree A (left, blue) -->
    <text x="120" y="68" text-anchor="middle" font-size="10" fill="#1565c0">Tree A（M/2）</text>
    <circle cx="120" cy="100" r="18" fill="#e53935" stroke="#b71c1c" stroke-width="1.2"/>
    <text x="120" y="104" text-anchor="middle" font-size="11" fill="white">G0</text>
    <circle cx="80" cy="170" r="18" fill="#1e88e5" stroke="#1565c0" stroke-width="1.2"/>
    <text x="80" y="174" text-anchor="middle" font-size="11" fill="white">G1</text>
    <circle cx="160" cy="170" r="18" fill="#1e88e5" stroke="#1565c0" stroke-width="1.2"/>
    <text x="160" y="174" text-anchor="middle" font-size="11" fill="white">G2</text>
    <circle cx="160" cy="225" r="18" fill="#1e88e5" stroke="#1565c0" stroke-width="1.2"/>
    <text x="160" y="229" text-anchor="middle" font-size="11" fill="white">G3</text>
    <line x1="108" y1="113" x2="92" y2="157" stroke="#1e88e5" stroke-width="1.5"/>
    <line x1="132" y1="113" x2="148" y2="157" stroke="#1e88e5" stroke-width="1.5"/>
    <line x1="160" y1="188" x2="160" y2="207" stroke="#1e88e5" stroke-width="1.5"/>

    <!-- Tree B (right, orange) -->
    <text x="290" y="68" text-anchor="middle" font-size="10" fill="#f57f17">Tree B（M/2）</text>
    <circle cx="290" cy="100" r="18" fill="#e53935" stroke="#b71c1c" stroke-width="1.2"/>
    <text x="290" y="104" text-anchor="middle" font-size="11" fill="white">G3</text>
    <circle cx="250" cy="170" r="18" fill="#fbc02d" stroke="#f57f17" stroke-width="1.2"/>
    <text x="250" y="174" text-anchor="middle" font-size="11" fill="#212121">G2</text>
    <circle cx="330" cy="170" r="18" fill="#fbc02d" stroke="#f57f17" stroke-width="1.2"/>
    <text x="330" y="174" text-anchor="middle" font-size="11" fill="#212121">G1</text>
    <circle cx="330" cy="225" r="18" fill="#fbc02d" stroke="#f57f17" stroke-width="1.2"/>
    <text x="330" y="229" text-anchor="middle" font-size="11" fill="#212121">G0</text>
    <line x1="278" y1="113" x2="262" y2="157" stroke="#f57f17" stroke-width="1.5"/>
    <line x1="302" y1="113" x2="318" y2="157" stroke="#f57f17" stroke-width="1.5"/>
    <line x1="330" y1="188" x2="330" y2="207" stroke="#f57f17" stroke-width="1.5"/>

    <text x="200" y="262" text-anchor="middle" font-size="11" fill="#37474f">两棵树各承担一半流量，链路利用率 ≈ 2×</text>
  </g>

  <!-- ============ Legend ============ -->
  <g transform="translate(40, 545)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#1e88e5"/>
    <text x="22" y="11" font-size="11" fill="#37474f">GPU rank（非 root）</text>
    <rect x="150" y="0" width="14" height="14" rx="2" fill="#e53935"/>
    <text x="172" y="11" font-size="11" fill="#37474f">root（tree 根 / DBT 两根分裂）</text>
    <rect x="370" y="0" width="14" height="14" rx="2" fill="#43a047"/>
    <text x="392" y="11" font-size="11" fill="#37474f">switch 内做 reduction（NVLS/SHARP）</text>
    <rect x="640" y="0" width="14" height="14" rx="2" fill="#fbc02d"/>
    <text x="662" y="11" font-size="11" fill="#37474f">中间节点（tree 内部 / DBT 第二棵）</text>
  </g>
</svg>
