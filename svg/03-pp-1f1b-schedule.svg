<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="system-ui, sans-serif">
  <defs>
    <pattern id="bubble" patternUnits="userSpaceOnUse" width="6" height="6">
      <path d="M 0 6 L 6 0" stroke="#cbd5e1" stroke-width="1"/>
    </pattern>
    <marker id="arpp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <style>
      .f{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1}
      .b{fill:#fce7f3;stroke:#be185d;stroke-width:1}
      .bub{fill:url(#bubble);stroke:#cbd5e1;stroke-width:1}
      .lbl{font-size:9px;fill:#0f172a;font-weight:500}
      .sl{font-size:11px;font-weight:600;fill:#374151}
      .title{font-size:14px;font-weight:700;fill:#0f172a}
      .sr{stroke:#dc2626;stroke-width:1.5;fill:none;marker-end:url(#arpp)}
    </style>
  </defs>
  <text x="410" y="22" text-anchor="middle" class="title">Pipeline Parallelism: 1F1B 调度 (PP=4, micro-batches=8)</text>
  <text x="410" y="40" text-anchor="middle" font-size="11" fill="#475569">通信原语: stage 边界 SendRecv (P2P), 每 micro-batch 1 次</text>
  <text class="sl" x="20" y="74">Stage 0</text>
  <text class="sl" x="20" y="114">Stage 1</text>
  <text class="sl" x="20" y="154">Stage 2</text>
  <text class="sl" x="20" y="194">Stage 3</text>
  <!-- Stage 0 -->
  <g transform="translate(75,60)">
    <rect class="f" x="0" y="0" width="32" height="22"/><text class="lbl" x="16" y="15" text-anchor="middle">F0</text>
    <rect class="f" x="32" y="0" width="32" height="22"/><text class="lbl" x="48" y="15" text-anchor="middle">F1</text>
    <rect class="f" x="64" y="0" width="32" height="22"/><text class="lbl" x="80" y="15" text-anchor="middle">F2</text>
    <rect class="f" x="96" y="0" width="32" height="22"/><text class="lbl" x="112" y="15" text-anchor="middle">F3</text>
    <rect class="b" x="128" y="0" width="32" height="22"/><text class="lbl" x="144" y="15" text-anchor="middle">B0</text>
    <rect class="f" x="160" y="0" width="32" height="22"/><text class="lbl" x="176" y="15" text-anchor="middle">F4</text>
    <rect class="b" x="192" y="0" width="32" height="22"/><text class="lbl" x="208" y="15" text-anchor="middle">B1</text>
    <rect class="f" x="224" y="0" width="32" height="22"/><text class="lbl" x="240" y="15" text-anchor="middle">F5</text>
    <rect class="b" x="256" y="0" width="32" height="22"/><text class="lbl" x="272" y="15" text-anchor="middle">B2</text>
    <rect class="f" x="288" y="0" width="32" height="22"/><text class="lbl" x="304" y="15" text-anchor="middle">F6</text>
    <rect class="b" x="320" y="0" width="32" height="22"/><text class="lbl" x="336" y="15" text-anchor="middle">B3</text>
    <rect class="f" x="352" y="0" width="32" height="22"/><text class="lbl" x="368" y="15" text-anchor="middle">F7</text>
    <rect class="b" x="384" y="0" width="32" height="22"/><text class="lbl" x="400" y="15" text-anchor="middle">B4</text>
    <rect class="b" x="416" y="0" width="32" height="22"/><text class="lbl" x="432" y="15" text-anchor="middle">B5</text>
