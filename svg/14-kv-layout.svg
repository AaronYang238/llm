<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#546e7a"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#212121">KV Cache 两种物理布局：连续预分配 vs 分页 block</text>

  <!-- ============ TOP: Contiguous layout ============ -->
  <text x="40" y="64" font-size="14" font-weight="600" fill="#c62828">(A) 连续预分配：每请求按 max_seq_len 占一整段</text>

  <!-- Request A row -->
  <g transform="translate(40, 78)">
    <text x="0" y="22" font-size="12" fill="#37474f">req A</text>
    <!-- used part -->
    <rect x="55"  y="2" width="180" height="28" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="145" y="21" text-anchor="middle" font-size="11" fill="white">已用 1000 tok</text>
    <!-- wasted part -->
    <rect x="235" y="2" width="380" height="28" fill="#ffcdd2" stroke="#c62828" stroke-dasharray="4 3"/>
    <text x="425" y="21" text-anchor="middle" font-size="11" fill="#b71c1c">预留但浪费（max=4096 → 空 3096 tok）</text>
  </g>

  <!-- Request B row -->
  <g transform="translate(40, 112)">
    <text x="0" y="22" font-size="12" fill="#37474f">req B</text>
    <rect x="55"  y="2" width="90" height="28" fill="#43a047" stroke="#1b5e20"/>
    <text x="100" y="21" text-anchor="middle" font-size="11" fill="white">500 tok</text>
    <rect x="145" y="2" width="470" height="28" fill="#ffcdd2" stroke="#c62828" stroke-dasharray="4 3"/>
    <text x="380" y="21" text-anchor="middle" font-size="11" fill="#b71c1c">预留但浪费</text>
  </g>

  <!-- Request C: cannot fit -->
  <g transform="translate(40, 146)">
    <text x="0" y="22" font-size="12" fill="#37474f">req C</text>
    <rect x="55" y="2" width="560" height="28" fill="none" stroke="#90a4ae" stroke-dasharray="3 3"/>
    <text x="335" y="21" text-anchor="middle" font-size="11" fill="#90a4ae">外部碎片：剩余空间总量够，但找不到连续大段 → 排队等待</text>
  </g>

  <text x="660" y="105" font-size="12" fill="#c62828" font-weight="600">问题</text>
  <text x="660" y="124" font-size="11" fill="#37474f">• 内部碎片：按 max 预留</text>
  <text x="660" y="142" font-size="11" fill="#37474f">• 外部碎片：连续段难找</text>
  <text x="660" y="160" font-size="11" fill="#37474f">• 利用率仅 20–40%</text>

  <!-- shape annotation -->
  <text x="40" y="198" font-size="11" font-family="monospace" fill="#546e7a">张量 shape: [B, H_kv, max_S, D]  —— max_S 固定，B 受限于最坏情况</text>

  <!-- Divider -->
  <line x1="40" y1="216" x2="920" y2="216" stroke="#cfd8dc" stroke-width="1"/>

  <!-- ============ BOTTOM: Paged layout ============ -->
  <text x="40" y="248" font-size="14" font-weight="600" fill="#2e7d32">(B) 分页 block：固定大小 block 按需分配，block table 间接映射</text>

  <!-- Logical sequences -->
  <g transform="translate(40, 262)">
    <text x="0" y="20" font-size="12" fill="#37474f">req A 逻辑序列</text>
    <rect x="120" y="2" width="44" height="26" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="142" y="20" text-anchor="middle" font-size="10" fill="white">blk0</text>
    <rect x="168" y="2" width="44" height="26" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="190" y="20" text-anchor="middle" font-size="10" fill="white">blk1</text>
    <rect x="216" y="2" width="44" height="26" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="238" y="20" text-anchor="middle" font-size="10" fill="white">blk2</text>
    <text x="280" y="20" font-size="11" fill="#546e7a">block_table = [5, 2, 9]</text>
  </g>

  <g transform="translate(40, 296)">
    <text x="0" y="20" font-size="12" fill="#37474f">req B 逻辑序列</text>
    <rect x="120" y="2" width="44" height="26" fill="#43a047" stroke="#1b5e20"/>
    <text x="142" y="20" text-anchor="middle" font-size="10" fill="white">blk0</text>
    <rect x="168" y="2" width="44" height="26" fill="#43a047" stroke="#1b5e20"/>
    <text x="190" y="20" text-anchor="middle" font-size="10" fill="white">blk1</text>
    <text x="280" y="20" font-size="11" fill="#546e7a">block_table = [7, 4]</text>
  </g>

  <!-- Physical block pool -->
  <text x="40" y="360" font-size="12" font-weight="600" fill="#37474f">物理 block 池（全局共享，每 block = block_size token 的 KV）</text>

  <g transform="translate(40, 372)">
    <!-- 12 blocks 0-11 -->
    <!-- 0 free -->
    <rect x="0" y="0" width="68" height="44" fill="#eceff1" stroke="#90a4ae"/>
    <text x="34" y="20" text-anchor="middle" font-size="10" fill="#546e7a">blk 0</text>
    <text x="34" y="36" text-anchor="middle" font-size="9" fill="#90a4ae">free</text>
    <!-- 1 free -->
    <rect x="73" y="0" width="68" height="44" fill="#eceff1" stroke="#90a4ae"/>
    <text x="107" y="20" text-anchor="middle" font-size="10" fill="#546e7a">blk 1</text>
    <text x="107" y="36" text-anchor="middle" font-size="9" fill="#90a4ae">free</text>
    <!-- 2 = A -->
    <rect x="146" y="0" width="68" height="44" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="180" y="20" text-anchor="middle" font-size="10" fill="white">blk 2</text>
    <text x="180" y="36" text-anchor="middle" font-size="9" fill="white">A</text>
    <!-- 3 free -->
    <rect x="219" y="0" width="68" height="44" fill="#eceff1" stroke="#90a4ae"/>
    <text x="253" y="20" text-anchor="middle" font-size="10" fill="#546e7a">blk 3</text>
    <text x="253" y="36" text-anchor="middle" font-size="9" fill="#90a4ae">free</text>
    <!-- 4 = B -->
    <rect x="292" y="0" width="68" height="44" fill="#43a047" stroke="#1b5e20"/>
    <text x="326" y="20" text-anchor="middle" font-size="10" fill="white">blk 4</text>
    <text x="326" y="36" text-anchor="middle" font-size="9" fill="white">B</text>
    <!-- 5 = A -->
    <rect x="365" y="0" width="68" height="44" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="399" y="20" text-anchor="middle" font-size="10" fill="white">blk 5</text>
    <text x="399" y="36" text-anchor="middle" font-size="9" fill="white">A</text>
    <!-- 6 free -->
    <rect x="438" y="0" width="68" height="44" fill="#eceff1" stroke="#90a4ae"/>
    <text x="472" y="20" text-anchor="middle" font-size="10" fill="#546e7a">blk 6</text>
    <text x="472" y="36" text-anchor="middle" font-size="9" fill="#90a4ae">free</text>
    <!-- 7 = B -->
    <rect x="511" y="0" width="68" height="44" fill="#43a047" stroke="#1b5e20"/>
    <text x="545" y="20" text-anchor="middle" font-size="10" fill="white">blk 7</text>
    <text x="545" y="36" text-anchor="middle" font-size="9" fill="white">B</text>
    <!-- 8 free -->
    <rect x="584" y="0" width="68" height="44" fill="#eceff1" stroke="#90a4ae"/>
    <text x="618" y="20" text-anchor="middle" font-size="10" fill="#546e7a">blk 8</text>
    <text x="618" y="36" text-anchor="middle" font-size="9" fill="#90a4ae">free</text>
    <!-- 9 = A -->
    <rect x="657" y="0" width="68" height="44" fill="#1e88e5" stroke="#0d47a1"/>
    <text x="691" y="20" text-anchor="middle" font-size="10" fill="white">blk 9</text>
    <text x="691" y="36" text-anchor="middle" font-size="9" fill="white">A</text>
    <!-- 10 free -->
    <rect x="730" y="0" width="68" height="44" fill="#eceff1" stroke="#90a4ae"/>
    <text x="764" y="20" text-anchor="middle" font-size="10" fill="#546e7a">blk 10</text>
    <text x="764" y="36" text-anchor="middle" font-size="9" fill="#90a4ae">free</text>
    <!-- 11 free -->
    <rect x="803" y="0" width="68" height="44" fill="#eceff1" stroke="#90a4ae"/>
    <text x="837" y="20" text-anchor="middle" font-size="10" fill="#546e7a">blk 11</text>
    <text x="837" y="36" text-anchor="middle" font-size="9" fill="#90a4ae">free</text>
  </g>

  <!-- Arrows from logical to physical (A: blk2,5,9) -->
  <path d="M 182,290 Q 200,350 186,372" stroke="#1e88e5" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <path d="M 230,290 Q 320,350 399,372" stroke="#1e88e5" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <path d="M 255,290 Q 480,348 691,372" stroke="#1e88e5" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <!-- B: blk7,4 -->
  <path d="M 207,324 Q 400,360 545,372" stroke="#43a047" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <path d="M 185,324 Q 260,360 326,372" stroke="#43a047" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>

  <text x="660" y="285" font-size="12" fill="#2e7d32" font-weight="600">收益</text>
  <text x="660" y="304" font-size="11" fill="#37474f">• 按需分页，无内部碎片</text>
  <text x="660" y="322" font-size="11" fill="#37474f">• 物理 block 任意复用</text>
  <text x="660" y="340" font-size="11" fill="#37474f">• 利用率 ~90%</text>

  <!-- shape annotation bottom -->
  <text x="40" y="448" font-size="11" font-family="monospace" fill="#546e7a">张量 shape: [2, num_blocks, H_kv, block_size, D]  —— 物理上一段连续显存切成等大 block</text>

  <!-- Legend -->
  <g transform="translate(40, 528)">
    <rect x="0" y="0" width="14" height="14" fill="#1e88e5"/>
    <text x="22" y="11" font-size="11" fill="#37474f">req A 的 KV</text>
    <rect x="120" y="0" width="14" height="14" fill="#43a047"/>
    <text x="142" y="11" font-size="11" fill="#37474f">req B 的 KV</text>
    <rect x="240" y="0" width="14" height="14" fill="#ffcdd2" stroke="#c62828" stroke-dasharray="3 2"/>
    <text x="262" y="11" font-size="11" fill="#37474f">连续布局的浪费空间</text>
    <rect x="430" y="0" width="14" height="14" fill="#eceff1" stroke="#90a4ae"/>
    <text x="452" y="11" font-size="11" fill="#37474f">空闲 block</text>
  </g>
</svg>
