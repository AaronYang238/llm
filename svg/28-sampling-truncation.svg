<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 350" font-family="Inter, system-ui, sans-serif" font-size="13">
  <text x="480" y="26" text-anchor="middle" font-size="16" font-weight="600">三种候选集截断法：同一个概率分布上，各自砍掉哪段尾巴</text>
  <text x="480" y="46" text-anchor="middle" font-size="12" fill="#546e7a">绿 = 保留并参与抽样的 token；灰 = 被砍掉（概率置 0）。token 已按概率从高到低排序</text>

  <!-- ===== Panel 1: top-k ===== -->
  <text x="165" y="76" text-anchor="middle" font-weight="600" fill="#1e88e5">① top-k = 4</text>
  <line x1="40" y1="250" x2="288" y2="250" stroke="#b0bec5"/>
  <rect x="48"  y="106" width="16" height="144" fill="#43a047"/>
  <rect x="68"  y="171" width="16" height="79"  fill="#43a047"/>
  <rect x="88"  y="203" width="16" height="47"  fill="#43a047"/>
  <rect x="108" y="221" width="16" height="29"  fill="#43a047"/>
  <rect x="128" y="232" width="16" height="18"  fill="#cfd8dc"/>
  <rect x="148" y="237" width="16" height="13"  fill="#cfd8dc"/>
  <rect x="168" y="241" width="16" height="9"   fill="#cfd8dc"/>
  <rect x="188" y="243" width="16" height="7"   fill="#cfd8dc"/>
  <rect x="208" y="245" width="16" height="5"   fill="#cfd8dc"/>
  <rect x="228" y="246" width="16" height="4"   fill="#cfd8dc"/>
  <rect x="248" y="246" width="16" height="4"   fill="#cfd8dc"/>
  <rect x="268" y="248" width="16" height="2"   fill="#cfd8dc"/>
  <line x1="126" y1="100" x2="126" y2="256" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="165" y="284" text-anchor="middle" font-size="11.5" fill="#546e7a">固定保留前 k 个，</text>
  <text x="165" y="300" text-anchor="middle" font-size="11.5" fill="#546e7a">不管分布尖还是平</text>

  <!-- ===== Panel 2: top-p ===== -->
  <text x="485" y="76" text-anchor="middle" font-weight="600" fill="#1e88e5">② top-p = 0.9</text>
  <line x1="360" y1="250" x2="608" y2="250" stroke="#b0bec5"/>
  <rect x="368" y="106" width="16" height="144" fill="#43a047"/>
  <rect x="388" y="171" width="16" height="79"  fill="#43a047"/>
  <rect x="408" y="203" width="16" height="47"  fill="#43a047"/>
  <rect x="428" y="221" width="16" height="29"  fill="#43a047"/>
  <rect x="448" y="232" width="16" height="18"  fill="#43a047"/>
  <rect x="468" y="237" width="16" height="13"  fill="#43a047"/>
  <rect x="488" y="241" width="16" height="9"   fill="#cfd8dc"/>
  <rect x="508" y="243" width="16" height="7"   fill="#cfd8dc"/>
  <rect x="528" y="245" width="16" height="5"   fill="#cfd8dc"/>
  <rect x="548" y="246" width="16" height="4"   fill="#cfd8dc"/>
  <rect x="568" y="246" width="16" height="4"   fill="#cfd8dc"/>
  <rect x="588" y="248" width="16" height="2"   fill="#cfd8dc"/>
  <line x1="486" y1="100" x2="486" y2="256" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="485" y="284" text-anchor="middle" font-size="11.5" fill="#546e7a">累计概率达 p 的最小集合，</text>
  <text x="485" y="300" text-anchor="middle" font-size="11.5" fill="#546e7a">数量自适应（这里 6 个）</text>

  <!-- ===== Panel 3: min-p ===== -->
  <text x="805" y="76" text-anchor="middle" font-weight="600" fill="#1e88e5">③ min-p = 0.1</text>
  <line x1="680" y1="250" x2="928" y2="250" stroke="#b0bec5"/>
  <rect x="688" y="106" width="16" height="144" fill="#43a047"/>
  <rect x="708" y="171" width="16" height="79"  fill="#43a047"/>
  <rect x="728" y="203" width="16" height="47"  fill="#43a047"/>
  <rect x="748" y="221" width="16" height="29"  fill="#43a047"/>
  <rect x="768" y="232" width="16" height="18"  fill="#43a047"/>
  <rect x="788" y="237" width="16" height="13"  fill="#cfd8dc"/>
  <rect x="808" y="241" width="16" height="9"   fill="#cfd8dc"/>
  <rect x="828" y="243" width="16" height="7"   fill="#cfd8dc"/>
  <rect x="848" y="245" width="16" height="5"   fill="#cfd8dc"/>
  <rect x="868" y="246" width="16" height="4"   fill="#cfd8dc"/>
  <rect x="888" y="246" width="16" height="4"   fill="#cfd8dc"/>
  <rect x="908" y="248" width="16" height="2"   fill="#cfd8dc"/>
  <line x1="680" y1="236" x2="928" y2="236" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="922" y="232" text-anchor="end" font-size="10.5" fill="#e53935">阈值 = p × 最高概率</text>
  <text x="805" y="284" text-anchor="middle" font-size="11.5" fill="#546e7a">保留 ≥ p×最高 的 token，</text>
  <text x="805" y="300" text-anchor="middle" font-size="11.5" fill="#546e7a">分布越尖留得越少（这里 5 个）</text>

  <!-- bottom note -->
  <text x="480" y="330" text-anchor="middle" font-size="12" fill="#bf360c">顺序：先 temperature 调分布形状 → 再用上面任一/多种裁剪候选集 → softmax 后抽样</text>
</svg>
