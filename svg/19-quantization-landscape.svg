<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#455a64"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#212121">加速手段全景：三类正交方法 + 量化的 scale 粒度谱</text>

  <!-- ===== Top: three families ===== -->
  <text x="40" y="60" font-size="13" font-weight="600" fill="#1565c0">三类加速手段（正交，可叠加）</text>

  <!-- Quantization -->
  <rect x="40" y="72" width="280" height="150" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="180" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#0d47a1">① 量化 Quantization</text>
  <text x="180" y="112" text-anchor="middle" font-size="10" fill="#37474f">省"每个数的比特"</text>
  <rect x="56" y="124" width="248" height="22" rx="3" fill="#bbdefb"/>
  <text x="64" y="139" font-size="10" fill="#0d47a1">权重 PTQ：GPTQ / AWQ / SmoothQuant（§8.3）</text>
  <rect x="56" y="150" width="248" height="22" rx="3" fill="#bbdefb"/>
  <text x="64" y="165" font-size="10" fill="#0d47a1">FP8 训练/推理（§8.4）</text>
  <rect x="56" y="176" width="248" height="22" rx="3" fill="#bbdefb"/>
  <text x="64" y="191" font-size="10" fill="#0d47a1">W4A16 / W8A8 + Marlin/Machete（§8.5）</text>
  <rect x="56" y="202" width="248" height="14" rx="3" fill="#bbdefb"/>
  <text x="64" y="213" font-size="10" fill="#0d47a1">KV 量化：KIVI（§8.6）</text>

  <!-- Speculative -->
  <rect x="340" y="72" width="280" height="150" rx="8" fill="#fff3e0" stroke="#f57f17" stroke-width="2"/>
  <text x="480" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100">② 投机解码 Speculative</text>
  <text x="480" y="112" text-anchor="middle" font-size="10" fill="#37474f">省"每 token 的 forward 次数"</text>
  <rect x="356" y="124" width="248" height="22" rx="3" fill="#ffe0b2"/>
  <text x="364" y="139" font-size="10" fill="#e65100">draft model：小模型先猜、大模型验证</text>
  <rect x="356" y="150" width="248" height="22" rx="3" fill="#ffe0b2"/>
  <text x="364" y="165" font-size="10" fill="#e65100">Medusa / EAGLE：自带 draft 头</text>
  <rect x="356" y="176" width="248" height="22" rx="3" fill="#ffe0b2"/>
  <text x="364" y="191" font-size="10" fill="#e65100">MTP：DeepSeek 原生多 token（§8.7）</text>
  <rect x="356" y="202" width="248" height="14" rx="3" fill="#ffe0b2"/>
  <text x="364" y="213" font-size="10" fill="#e65100">关键指标：acceptance rate（接受率）</text>

  <!-- Sparsity -->
  <rect x="640" y="72" width="280" height="150" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="780" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">③ 稀疏化 Sparsity</text>
  <text x="780" y="112" text-anchor="middle" font-size="10" fill="#37474f">省"无效的乘加"</text>
  <rect x="656" y="124" width="248" height="22" rx="3" fill="#c8e6c9"/>
  <text x="664" y="139" font-size="10" fill="#1b5e20">MoE 路由稀疏：只激活 top-k 专家</text>
  <rect x="656" y="150" width="248" height="22" rx="3" fill="#c8e6c9"/>
  <text x="664" y="165" font-size="10" fill="#1b5e20">Activation Sparsity：FFN 大量零输出</text>
  <rect x="656" y="176" width="248" height="22" rx="3" fill="#c8e6c9"/>
  <text x="664" y="191" font-size="10" fill="#1b5e20">稀疏 Attention：NSA / MoBA（§8.8）</text>
  <rect x="656" y="202" width="248" height="14" rx="3" fill="#c8e6c9"/>
  <text x="664" y="213" font-size="10" fill="#1b5e20">长序列里大部分 attention 接近零</text>

  <!-- combine note -->
  <text x="480" y="244" text-anchor="middle" font-size="11" fill="#546e7a">生产部署常叠加，如：INT4 权重 + FP8 KV + 投机解码 + MoE 稀疏</text>

  <!-- Divider -->
  <line x1="40" y1="258" x2="920" y2="258" stroke="#cfd8dc" stroke-width="1"/>

  <!-- ===== Middle: scale granularity spectrum ===== -->
  <text x="40" y="284" font-size="13" font-weight="600" fill="#1565c0">量化 scale 粒度谱：越细 → 精度越高、开销越大</text>

  <!-- spectrum bar -->
  <g transform="translate(60, 300)">
    <!-- per-tensor -->
    <rect x="0" y="0" width="190" height="58" rx="6" fill="#ffcdd2" stroke="#c62828"/>
    <text x="95" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c">per-tensor</text>
    <text x="95" y="36" text-anchor="middle" font-size="9" fill="#37474f">1 个 scale / 整张量</text>
    <text x="95" y="50" text-anchor="middle" font-size="9" fill="#c62828">最快 · 精度最差</text>

    <!-- per-channel -->
    <rect x="205" y="0" width="190" height="58" rx="6" fill="#ffe0b2" stroke="#f57f17"/>
    <text x="300" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">per-channel</text>
    <text x="300" y="36" text-anchor="middle" font-size="9" fill="#37474f">每列/行 1 个 scale</text>
    <text x="300" y="50" text-anchor="middle" font-size="9" fill="#e65100">权重常用</text>

    <!-- per-token -->
    <rect x="410" y="0" width="190" height="58" rx="6" fill="#fff9c4" stroke="#fbc02d"/>
    <text x="505" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#f57f17">per-token</text>
    <text x="505" y="36" text-anchor="middle" font-size="9" fill="#37474f">每 token 1 个 scale</text>
    <text x="505" y="50" text-anchor="middle" font-size="9" fill="#f57f17">激活常用</text>

    <!-- per-group/block -->
    <rect x="615" y="0" width="190" height="58" rx="6" fill="#c8e6c9" stroke="#2e7d32"/>
    <text x="710" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20">per-group / block</text>
    <text x="710" y="36" text-anchor="middle" font-size="9" fill="#37474f">每 128 列/128×128 块</text>
    <text x="710" y="50" text-anchor="middle" font-size="9" fill="#1b5e20">最精 · DeepSeek FP8</text>

    <!-- arrow -->
    <line x1="0" y1="74" x2="805" y2="74" stroke="#455a64" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="0" y="90" font-size="10" fill="#546e7a">粗（省）</text>
    <text x="770" y="90" font-size="10" fill="#546e7a">细（准）</text>
  </g>

  <!-- ===== Bottom: outlier problem ===== -->
  <text x="40" y="430" font-size="13" font-weight="600" fill="#c62828">量化的头号敌人：outlier（激活离群值）</text>

  <!-- distribution sketch -->
  <g transform="translate(60, 444)">
    <!-- axis -->
    <line x1="0" y1="100" x2="380" y2="100" stroke="#90a4ae" stroke-width="1"/>
    <line x1="0" y1="100" x2="0" y2="20" stroke="#90a4ae" stroke-width="1"/>
    <!-- main bulk -->
    <path d="M 20,100 Q 70,30 120,100" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
    <text x="70" y="118" text-anchor="middle" font-size="9" fill="#37474f">99% 元素挤在小范围</text>
    <!-- outliers -->
    <line x1="300" y1="100" x2="300" y2="45" stroke="#e53935" stroke-width="2.5"/>
    <line x1="330" y1="100" x2="330" y2="55" stroke="#e53935" stroke-width="2.5"/>
    <text x="320" y="40" text-anchor="middle" font-size="9" fill="#c62828">少数 outlier</text>
    <text x="320" y="118" text-anchor="middle" font-size="9" fill="#c62828">拉大量化范围</text>
  </g>

  <g transform="translate(480, 444)">
    <text x="0" y="14" font-size="11" font-weight="600" fill="#37474f">各 PTQ 方法怎么对付 outlier：</text>
    <text x="0" y="36" font-size="10" fill="#37474f">• GPTQ：用 Hessian 二阶信息，逐列补偿量化误差</text>
    <text x="0" y="56" font-size="10" fill="#37474f">• AWQ：识别重要权重通道，按激活幅度缩放保护</text>
    <text x="0" y="76" font-size="10" fill="#37474f">• SmoothQuant：把激活 outlier「迁移」到权重侧</text>
    <text x="0" y="96" font-size="10" fill="#37474f">• per-group/block scale：用更细粒度隔离 outlier</text>
    <text x="0" y="120" font-size="9" fill="#546e7a">核心矛盾：1 个 outlier 就能让整段量化范围浪费在它身上</text>
  </g>
</svg>
